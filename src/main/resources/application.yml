spring:
  application:
    name: manage

  datasource:
    url: jdbc:mysql://localhost:3306/manage_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: manage_user
    password: manage_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci1qd3QtaG1hYy1zaGEyNTY=
  access-token-expiry-ms: 900000
  refresh-token-expiry-ms: 604800000

rate-limit:
  capacity: 20
  refill-period-seconds: 60

server:
  port: 8080
